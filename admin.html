<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Admin สต็อก - หาดใหญ่</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root {
    --blue-900: #0f2d5e;
    --blue-700: #1a4a9c;
    --blue-500: #2563eb;
    --blue-400: #3b82f6;
    --blue-100: #dbeafe;
    --blue-50:  #eff6ff;
    --green-600: #16a34a;
    --green-100: #dcfce7;
    --red-500:  #ef4444;
    --gray-50:  #f8fafc;
    --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;
    --gray-400: #94a3b8;
    --gray-600: #475569;
    --gray-800: #1e293b;
    --white:    #ffffff;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family: 'Sarabun', sans-serif;
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  /* ─── Phone Frame ─── */
  .phone-frame {
    width: 390px; height: 844px;
    background: var(--gray-50);
    border-radius: 48px;
    overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,.6), inset 0 0 0 2px rgba(255,255,255,.1);
    display: flex; flex-direction: column;
  }

  /* ─── Status Bar ─── */
  .status-bar {
    background: var(--blue-900);
    padding: 14px 28px 8px;
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0;
  }
  .status-time { color:white; font-size:15px; font-weight:600; }
  .status-icons { color:white; font-size:12px; }

  /* ─── Header ─── */
  .header {
    background: var(--blue-900);
    padding: 10px 20px 14px;
    flex-shrink: 0;
  }
  .header-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .header-title { color:white; font-size:18px; font-weight:700; }
  .header-actions {
    display:flex; align-items:center; gap:8px;
  }
  .auth-chip {
    max-width:145px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    color:rgba(255,255,255,.75); font-size:10.5px; font-weight:600;
  }
  .refresh-btn {
    background: rgba(255,255,255,.15); border: none; border-radius: 8px;
    color: white; font-size: 18px; width: 32px; height: 32px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background .2s; font-family: 'Sarabun', sans-serif;
  }
  .logout-btn {
    background:rgba(239,68,68,.2); border:1px solid rgba(255,255,255,.22);
    border-radius:8px; color:white; font-size:11px; font-weight:700;
    padding:7px 8px; cursor:pointer; font-family:'Sarabun',sans-serif;
  }
  .refresh-btn:active { background: rgba(255,255,255,.3); }
  .logout-btn:active { background:rgba(239,68,68,.35); }
  .week-nav {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(255,255,255,.1); border-radius: 12px; padding: 5px 10px;
  }
  .week-btn {
    background: none; border: none; color: white; font-size: 22px;
    cursor: pointer; width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px; transition: background .15s; line-height: 1;
  }
  .week-btn:active { background: rgba(255,255,255,.2); }
  .week-btn:disabled { opacity: .3; cursor: default; }
  .week-label { color:white; font-size:13px; font-weight:600; text-align:center; flex:1; }

  /* ─── Content ─── */
  .content {
    flex:1; overflow-y:auto; padding: 12px 13px 20px;
    scrollbar-width:none; display:flex; flex-direction:column; gap:10px;
  }
  .content::-webkit-scrollbar { display:none; }

  /* ─── Loading / Error ─── */
  .state-center {
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:12px;
    padding:60px 20px; flex:1;
  }
  .spinner {
    width:32px; height:32px; border:3px solid var(--gray-200);
    border-top-color: var(--blue-500); border-radius:50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .state-text { font-size:13px; color:var(--gray-400); }
  .retry-btn {
    padding:8px 20px; border-radius:10px; border:none;
    background:var(--blue-500); color:white;
    font-family:'Sarabun',sans-serif; font-size:13px; font-weight:600;
    cursor:pointer; margin-top:4px;
  }
  .danger-btn {
    padding:8px 20px; border-radius:10px; border:none;
    background:var(--red-500); color:white;
    font-family:'Sarabun',sans-serif; font-size:13px; font-weight:700;
    cursor:pointer; margin-top:4px;
  }

  /* ─── Stats Card ─── */
  .stats-card {
    background: linear-gradient(135deg, var(--blue-700), var(--blue-900));
    border-radius: 18px; padding: 16px 18px;
    box-shadow: 0 4px 16px rgba(37,99,235,.35);
  }
  .stats-label {
    color: rgba(255,255,255,.65); font-size:11px; font-weight:700;
    letter-spacing:.8px; text-transform:uppercase; margin-bottom:12px;
  }
  .stats-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  .stat-item { text-align:center; }
  .stat-num { color:white; font-size:28px; font-weight:700; line-height:1; }
  .stat-unit { color:rgba(255,255,255,.55); font-size:10.5px; margin-top:4px; }

  /* ─── Section Header ─── */
  .section-hd {
    font-size:11px; font-weight:700; color:var(--gray-400);
    letter-spacing:.8px; text-transform:uppercase; padding:2px 2px 0;
  }

  /* ─── Top Items Card ─── */
  .top-card {
    background:white; border-radius:16px; padding:14px 16px;
    box-shadow:0 1px 4px rgba(0,0,0,.06); border:1.5px solid var(--gray-100);
  }
  .bar-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .bar-row:last-child { margin-bottom:0; }
  .bar-name {
    font-size:11.5px; color:var(--gray-800); font-weight:500;
    flex:0 0 120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .bar-wrap { flex:1; background:var(--gray-100); border-radius:4px; height:8px; overflow:hidden; }
  .bar-fill { height:100%; background:var(--blue-500); border-radius:4px; transition:width .5s ease; }
  .bar-qty { font-size:11.5px; font-weight:700; color:var(--gray-600); flex:0 0 28px; text-align:right; }

  .empty-msg { font-size:13px; color:var(--gray-400); text-align:center; padding:20px; }

  /* ─── Submission Cards ─── */
  .sub-card {
    background:white; border-radius:13px; overflow:hidden;
    box-shadow:0 1px 3px rgba(0,0,0,.05); border:1.5px solid var(--gray-100);
  }
  .sub-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:11px 14px; cursor:pointer; user-select:none; transition:background .15s;
  }
  .sub-header:active { background:var(--gray-50); }
  .sub-date { font-size:12.5px; font-weight:700; color:var(--gray-800); }
  .sub-preview { font-size:11px; color:var(--gray-400); margin-top:2px; }
  .sub-right { display:flex; align-items:center; gap:6px; flex-shrink:0; }
  .sub-badge {
    background:var(--blue-100); color:var(--blue-700);
    font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:10px;
  }
  .sub-chevron { font-size:16px; color:var(--gray-400); transition:transform .2s; }
  .sub-card.open .sub-chevron { transform:rotate(90deg); }
  .sub-body {
    display:none; padding:0 14px 12px;
    border-top:1px solid var(--gray-100);
  }
  .sub-card.open .sub-body { display:block; }
  .sub-item-row {
    display:flex; justify-content:space-between; align-items:center;
    padding:6px 0; border-bottom:1px solid var(--gray-100); font-size:12.5px;
  }
  .sub-item-row:last-child { border-bottom:none; }
  .sub-item-name { color:var(--gray-800); font-weight:500; }
  .sub-item-qty { color:var(--blue-700); font-weight:700; flex-shrink:0; margin-left:8px; }
  .sub-note {
    margin-top:8px; padding:7px 10px; background:var(--gray-50);
    border-radius:8px; font-size:12px; color:var(--gray-600); line-height:1.5;
  }
</style>
</head>
<body>
<div class="phone-frame">

  <div class="status-bar">
    <span class="status-time" id="clock">--:--</span>
    <span class="status-icons">▲ WiFi 🔋</span>
  </div>

  <div class="header">
    <div class="header-row">
      <span class="header-title">📊 Admin สต็อก</span>
      <div class="header-actions">
        <span class="auth-chip" id="admin-email">กำลังตรวจสอบ...</span>
        <button class="refresh-btn" id="refresh-btn" title="รีเฟรช">↻</button>
        <button class="logout-btn" id="logout-btn" title="ออกจากระบบ">ออก</button>
      </div>
    </div>
    <div class="week-nav">
      <button class="week-btn" id="prev-week">‹</button>
      <span class="week-label" id="week-label">กำลังโหลด...</span>
      <button class="week-btn" id="next-week" disabled>›</button>
    </div>
  </div>

  <div class="content" id="content">
    <div class="state-center">
      <div class="spinner"></div>
      <div class="state-text">กำลังโหลดข้อมูล...</div>
    </div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://tpeipvacrtdligxhfomd.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRwZWlwdmFjcnRkbGlneGhmb21kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NTQ1MDksImV4cCI6MjA4OTAzMDUwOX0.sJdUEmPVppEB6PQaoINbxyc7-vnlMD1Rao4OqIAvMEM';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const ADMIN_ROLES = new Set(['ks_stock_admin', 'admin']);

const MONTHS_SHORT = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

// ─── Week helpers (mirrors Edge Function logic) ───
function weekStartBangkok(date) {
  const bangkokMs = date.getTime() + 7 * 3600000;
  const bd = new Date(bangkokMs);
  const dow = bd.getUTCDay(); // 0=Sunday
  return new Date(Date.UTC(bd.getUTCFullYear(), bd.getUTCMonth(), bd.getUTCDate() - dow));
}

function addWeeks(date, n) {
  return new Date(date.getTime() + n * 7 * 24 * 3600000);
}

function toYMD(date) {
  return date.toISOString().slice(0, 10);
}

function weekLabel(startDate) {
  const end = new Date(startDate.getTime() + 6 * 24 * 3600000);
  const sm = MONTHS_SHORT[startDate.getUTCMonth()];
  const em = MONTHS_SHORT[end.getUTCMonth()];
  if (startDate.getUTCMonth() === end.getUTCMonth()) {
    return `${startDate.getUTCDate()}-${end.getUTCDate()} ${sm} ${startDate.getUTCFullYear()}`;
  }
  return `${startDate.getUTCDate()} ${sm} - ${end.getUTCDate()} ${em} ${end.getUTCFullYear()}`;
}

function formatBangkok(utcStr) {
  const ms = new Date(utcStr).getTime() + 7 * 3600000;
  const d = new Date(ms);
  const day = d.getUTCDate().toString().padStart(2, '0');
  const mon = MONTHS_SHORT[d.getUTCMonth()];
  const h = d.getUTCHours().toString().padStart(2, '0');
  const m = d.getUTCMinutes().toString().padStart(2, '0');
  return `${day} ${mon} เวลา ${h}:${m} น.`;
}

function fmtQty(n) {
  const num = Number(n);
  return num % 1 === 0 ? String(num) : num.toFixed(1);
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, (char) => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[char]));
}

function hasAdminRole(user) {
  const meta = user?.app_metadata || {};
  const roles = Array.isArray(meta.roles) ? meta.roles : [];
  return ADMIN_ROLES.has(meta.role) || roles.some((role) => ADMIN_ROLES.has(role));
}

function loginUrl() {
  const redirect = encodeURIComponent(location.pathname + location.search + location.hash);
  return `login.html?redirect=${redirect}`;
}

function redirectToLogin() {
  location.replace(loginUrl());
}

// ─── State ───
let currentWeekStart = weekStartBangkok(new Date());
const todayWeekStart = weekStartBangkok(new Date());

// ─── Clock ───
function updateClock() {
  const ms = Date.now() + 7 * 3600000;
  const d = new Date(ms);
  document.getElementById('clock').textContent =
    d.getUTCHours().toString().padStart(2, '0') + ':' +
    d.getUTCMinutes().toString().padStart(2, '0');
}
updateClock();
setInterval(updateClock, 15000);

// ─── Render ───
function renderLoading() {
  document.getElementById('content').innerHTML = `
    <div class="state-center">
      <div class="spinner"></div>
      <div class="state-text">กำลังโหลด...</div>
    </div>`;
}

function renderError(msg) {
  document.getElementById('content').innerHTML = `
    <div class="state-center">
      <div style="font-size:36px">⚠️</div>
      <div class="state-text">${escapeHtml(msg)}</div>
      <button class="retry-btn" onclick="loadData()">ลองใหม่</button>
    </div>`;
}

function renderAccessDenied() {
  document.getElementById('content').innerHTML = `
    <div class="state-center">
      <div style="font-size:36px">🔒</div>
      <div class="state-text">บัญชีนี้ยังไม่ได้รับสิทธิ์ Admin</div>
      <button class="danger-btn" onclick="signOut()">ออกจากระบบ</button>
    </div>`;
}

function renderContent(weeklyItems, submissions) {
  // ── Stats ──
  const totalSubs = submissions.length;
  const allLines = submissions.flatMap(s => s.stock_submission_items || []);
  const totalQty = allLines.reduce((sum, i) => sum + Number(i.qty), 0);
  const uniqueSKUs = new Set(allLines.map(i => i.inventory_items?.name)).size;

  let html = `
    <div class="stats-card">
      <div class="stats-label">สัปดาห์นี้</div>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-num">${totalSubs}</div>
          <div class="stat-unit">ครั้งที่ส่ง</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">${fmtQty(totalQty)}</div>
          <div class="stat-unit">จำนวนรวม</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">${uniqueSKUs}</div>
          <div class="stat-unit">ชนิดสินค้า</div>
        </div>
      </div>
    </div>`;

  // ── Top Items Bar Chart ──
  html += `<div class="section-hd">สินค้าที่สั่งมากสุด</div>`;
  if (weeklyItems.length === 0) {
    html += `<div class="top-card"><div class="empty-msg">ยังไม่มีข้อมูลในสัปดาห์นี้</div></div>`;
  } else {
    const top = weeklyItems.slice(0, 10);
    const maxQty = Number(top[0].total_qty) || 1;
    html += `<div class="top-card">`;
    for (const item of top) {
      const pct = Math.round((Number(item.total_qty) / maxQty) * 100);
      const itemName = escapeHtml(item.item_name);
      html += `
        <div class="bar-row">
          <div class="bar-name" title="${itemName}">${itemName}</div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div></div>
          <div class="bar-qty">${fmtQty(item.total_qty)}</div>
        </div>`;
    }
    html += `</div>`;
  }

  // ── Recent Submissions ──
  html += `<div class="section-hd">รายการสั่งทั้งหมด</div>`;
  if (submissions.length === 0) {
    html += `<div class="top-card"><div class="empty-msg">ยังไม่มีรายการในสัปดาห์นี้</div></div>`;
  } else {
    submissions.forEach((s, i) => {
      const lines = s.stock_submission_items || [];
      const preview = lines.slice(0, 2)
        .map(it => `${it.inventory_items?.name} ${fmtQty(it.qty)}`)
        .join(', ') + (lines.length > 2 ? ` +${lines.length - 2} อื่น` : '');
      const safePreview = escapeHtml(preview || 'ไม่มีรายการ');
      const safeNote = escapeHtml(s.note);
      html += `
        <div class="sub-card" id="sub-${i}">
          <div class="sub-header" onclick="toggleSub(${i})">
            <div>
              <div class="sub-date">${formatBangkok(s.submitted_at)}</div>
              <div class="sub-preview">${safePreview}</div>
            </div>
            <div class="sub-right">
              <span class="sub-badge">${lines.length} รายการ</span>
              <span class="sub-chevron">›</span>
            </div>
          </div>
          <div class="sub-body">
            ${lines.map(it => `
              <div class="sub-item-row">
                <span class="sub-item-name">${escapeHtml(it.inventory_items?.name ?? '-')}</span>
                <span class="sub-item-qty">${fmtQty(it.qty)} ${escapeHtml(it.unit)}</span>
              </div>`).join('')}
            ${s.note ? `<div class="sub-note">💬 ${safeNote}</div>` : ''}
          </div>
        </div>`;
    });
  }

  document.getElementById('content').innerHTML = html;
}

function toggleSub(idx) {
  document.getElementById('sub-' + idx).classList.toggle('open');
}

// ─── Load Data ───
async function loadData() {
  renderLoading();

  const weekStart = toYMD(currentWeekStart);

  document.getElementById('week-label').textContent = weekLabel(currentWeekStart);
  document.getElementById('next-week').disabled = weekStart >= toYMD(todayWeekStart);

  try {
    const [weeklyRes, subRes] = await Promise.all([
      sb.from('weekly_order_totals')
        .select('item_name, total_qty, category')
        .eq('week_start_date', weekStart)
        .order('total_qty', { ascending: false }),

      sb.from('stock_submissions')
        .select(`
          id, submitted_at, note,
          stock_submission_items (
            qty, unit,
            inventory_items ( name, category )
          )
        `)
        .eq('week_start_date', weekStart)
        .order('submitted_at', { ascending: false })
    ]);

    if (weeklyRes.error) throw weeklyRes.error;
    if (subRes.error) throw subRes.error;

    renderContent(weeklyRes.data ?? [], subRes.data ?? []);
  } catch (err) {
    renderError(err.message || 'โหลดข้อมูลไม่สำเร็จ');
  }
}

// ─── Navigation ───
document.getElementById('prev-week').addEventListener('click', () => {
  currentWeekStart = addWeeks(currentWeekStart, -1);
  loadData();
});
document.getElementById('next-week').addEventListener('click', () => {
  if (toYMD(currentWeekStart) < toYMD(todayWeekStart)) {
    currentWeekStart = addWeeks(currentWeekStart, 1);
    loadData();
  }
});
document.getElementById('refresh-btn').addEventListener('click', loadData);
document.getElementById('logout-btn').addEventListener('click', signOut);

async function requireAdmin() {
  const { data, error } = await sb.auth.getUser();
  if (error || !data?.user) {
    redirectToLogin();
    return false;
  }

  document.getElementById('admin-email').textContent = data.user.email || 'Admin';
  if (!hasAdminRole(data.user)) {
    renderAccessDenied();
    return false;
  }

  return true;
}

async function signOut() {
  await sb.auth.signOut();
  location.replace('login.html');
}

sb.auth.onAuthStateChange((_event, session) => {
  if (!session) redirectToLogin();
});

// ─── Boot ───
requireAdmin().then((allowed) => {
  if (allowed) loadData();
});
</script>
</body>
</html>
