  .review-subtitle { font-size:12px; color:var(--gray-400); margin-bottom:12px; }

  .review-empty { text-align:center; color:var(--gray-400); font-size:13px; padding:30px 0; }

</head>

<div class="phone-frame">

  <div class="status-bar">
    <span class="status-time" id="clock">9:41</span>
    <div class="status-icons"><span>●●●</span><span>WiFi</span><span>🔋</span></div>
  </div>

  <div class="header">
    <div class="header-title">🧮 นับสต็อกคงเหลือ</div>
    <div class="header-date" id="hdate">สาขา หาดใหญ่</div>
    <a href="index.html" style="color:rgba(255,255,255,.7);font-size:11px;text-decoration:none;">← กลับไปหน้าสั่งของ</a>
  </div>

  <div class="tab-bar" id="tab-bar"></div>

  <div class="search-bar">
    <div class="search-input-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="search-input" type="text" placeholder="ค้นหาสินค้า..." oninput="filterItems(this.value)" autocomplete="off">
      <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
    </div>
  </div>

  <div class="summary-bar">
    <span class="summary-text">กรอกเฉพาะรายการที่นับจริง ไม่บังคับครบ</span>
    <span class="summary-count" id="tab-count">0 / 0</span>
  </div>

  <div class="content" id="content-area"></div>

  <div class="bottom-bar">
    <div class="bottom-row">
      <span class="bottom-label">รายการที่นับแล้ว</span>
      <span class="bottom-count" id="total-filled">0 รายการ</span>
    </div>
    <textarea class="note-field" id="note-field" placeholder="💬 หมายเหตุ?" rows="2"></textarea>
    <button class="btn-lock" id="btn-review" onclick="openReview()">📝 ดูสรุปแนะนำสั่ง</button>
  </div>

  <!-- Review Sheet -->
  <div class="review-overlay hidden" id="review-overlay">
    <div class="review-sheet">
      <div class="review-drag"></div>
      <div class="review-title">📝 สรุปใบสั่งของแนะนำ</div>
      <div class="review-subtitle" id="review-subtitle">สาขา หาดใหญ่</div>
      <div class="review-body"><div id="review-body"></div></div>
      <div class="review-warning">⚠️ ยืนยันแล้ว: บันทึกการนับสต็อก + ส่งใบสั่งของ (เฉพาะรายการที่ติ๊กไว้) เข้าระบบทันที</div>
      <div class="review-buttons">
        <button class="btn-cancel" onclick="closeReview()">← แก้ไข</button>
        <button class="btn-confirm" id="btn-confirm" onclick="confirmAndSend()">✅ ยืนยัน & ส่ง</button>
      </div>
    </div>
  </div>

  <div class="loading-overlay hidden" id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">กำลังส่งข้อมูล…</div>
  </div>

  <div class="done-screen hidden" id="done-screen">
    <div class="done-icon">✅</div>
    <div class="done-title">เสร็จแล้ว!</div>
    <div class="done-detail" id="done-detail"></div>
    <button class="btn-again" onclick="location.reload()">🔄 ทำรอบใหม่</button>
  </div>

</div>

    { name:'วุ้นมะพร้าวเม็ดเล็ก ยี่ห้อ ทีอีเอ', label:'วุ้นมะพร้าวเม็ดเล็ก ทีอีเอ', unit:'ถุง' },

    { name:'บุกติ่งฟง รสบราวน์ชูการ์', units:['ลัง','ถุง'] },
  ]}]},
  { tab:'พร้อมเพย์', groups:[ { section:'พร้อมเพย์', items:[
    { name:'กระดาษครอบฝาแก้ว', unit:'แพ็ค' },
    { name:'บ๊วยดอง กระปุกใหญ่', unit:'กระปุก' },

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let currentTab = 0;
// suggestions: Map('name|unit' -> {last_remaining, last_counted_week, avg_weekly_use, suggested_qty})
let suggestions = new Map();

function thaiISO(d = new Date()) {
  const thai = new Date(d.getTime() + 7 * 60 * 60 * 1000);
  return thai.toISOString().replace('Z', '+07:00');
}
function suggKey(name, unit) { return name + '|' + unit; }

// ══════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════
function renderTabs() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = CATALOG.map((t, i) =>
    `<button class="tab-btn${i===0?' active':''}" onclick="switchTab(${i},this)">${t.tab}</button>`
  ).join('');
}

function renderContent() {
  const area = document.getElementById('content-area');
  area.innerHTML = CATALOG.map((t, ti) => {
    const groupsHtml = t.groups.map(g => {
      const itemsHtml = g.items.map(item => renderItemRow(item, t.tab)).join('');
      return `<div class="section-label">${g.section}</div>${itemsHtml}`;
    }).join('');
    return `<div class="tab-panel${ti===0?' active':''}" id="tab-${ti}">${groupsHtml}</div>`;
  }).join('');
}

function renderItemRow(item, tab) {
  const label = item.label || item.name;
  const units = item.units || [item.unit];
  const inputsHtml = units.map(u => {
    const key = suggKey(item.name, u);
    return `<div class="unit-field">
      <span class="unit-field-label">${u}</span>
      <input class="qty-input" type="number" min="0" inputmode="decimal"
        data-name="${escapeAttr(item.name)}" data-unit="${escapeAttr(u)}"
        placeholder="—" oninput="onQtyInput(this)">
    </div>`;
  }).join('');
  return `<div class="item-row" data-tab="${escapeAttr(tab)}" data-name="${escapeAttr(item.name)}">
    <div class="item-top">
      <div class="item-info">
        <div class="item-name">${label}</div>
        <div class="item-hint" id="hint-${hintId(item.name, units[0])}">กำลังโหลด…</div>
      </div>
      <div class="unit-inputs">${inputsHtml}</div>
    </div>
  </div>`;
}

function hintId(name, unit) {
  return btoa(unencodeURIComponent_safe(name + '|' + unit)).replace(/[^a-zA-Z0-9]/g, '');
}
function unencodeURIComponent_safe(s) { return encodeURIComponent(s); }
function escapeAttr(s) { return String(s).replace(/"/g, '&quot;'); }

function hintTextFor(item) {
  const units = item.units || [item.unit];
  const parts = units.map(u => {
    const s = suggestions.get(suggKey(item.name, u));
    if (!s) return `${u}: ยังไม่เคยนับ`;
    const last = (s.last_remaining ?? '—') + ' ' + u;
    const sugg = s.suggested_qty === null || s.suggested_qty === undefined
      ? 'ยังไม่มีข้อมูลพอ'
      : `แนะนำสั่ง <b>${s.suggested_qty}</b> ${u}`;
    return `ครั้งก่อนเหลือ ${last} · ${sugg}`;
  });
  return parts.join(' | ');
}

function refreshAllHints() {
  CATALOG.forEach(t => t.groups.forEach(g => g.items.forEach(item => {
    const units = item.units || [item.unit];
    const el = document.getElementById('hint-' + hintId(item.name, units[0]));
    if (el) el.innerHTML = hintTextFor(item);
  })));
}

// ══════════════════════════════════════════
//  LOAD SUGGESTIONS FROM API
// ══════════════════════════════════════════
async function loadSuggestions() {
  try {
    const resp = await fetch(STOCK_COUNT_API_URL + '?branch=' + encodeURIComponent(BRANCH));
    const json = await resp.json();
    if (resp.ok && json.suggestions) {
      json.suggestions.forEach(s => {
        suggestions.set(suggKey(s.item_name, s.unit), s);
      });
    }
  } catch (e) {
    console.error('โหลดตัวเลขแนะนำไม่สำเร็จ', e);
  }
  refreshAllHints();
}

// ══════════════════════════════════════════
//  TAB / SEARCH
// ══════════════════════════════════════════
function switchTab(idx, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + idx).classList.add('active');
  btn.classList.add('active');
  currentTab = idx;
  updateTabCount();
  document.getElementById('content-area').scrollTo({ top: 0 });
  const s = document.getElementById('search-input');
  if (s) { s.value = ''; filterItems(''); }
}

function filterItems(query) {
  const q = query.trim().toLowerCase();
  document.getElementById('search-clear').style.display = q ? 'block' : 'none';
  document.querySelectorAll('.item-row').forEach(row => {
    const name = (row.dataset.name || '').toLowerCase();
    row.style.display = (!q || name.includes(q)) ? '' : 'none';
  });
}
function clearSearch() {
  document.getElementById('search-input').value = '';
  filterItems('');
}

// ══════════════════════════════════════════
//  INPUT HANDLING
// ══════════════════════════════════════════
function onQtyInput(input) {
  const row = input.closest('.item-row');
  const anyFilled = [...row.querySelectorAll('.qty-input')].some(i => i.value !== '');
  row.classList.toggle('has-value', anyFilled);
  updateCounts();
}

function updateCounts() {
  let total = 0;
  document.querySelectorAll('.item-row').forEach(row => {
    if ([...row.querySelectorAll('.qty-input')].some(i => i.value !== '')) total++;
  });
  document.getElementById('total-filled').textContent = total + ' รายการ';
  updateTabCount();
}
function updateTabCount() {
  const panel = document.getElementById('tab-' + currentTab);
  const rows = panel.querySelectorAll('.item-row');
  let filled = 0;
  rows.forEach(row => {
    if ([...row.querySelectorAll('.qty-input')].some(i => i.value !== '')) filled++;
  });
  document.getElementById('tab-count').textContent = filled + ' / ' + rows.length;
}

// ══════════════════════════════════════════
//  EXTRACT: การนับ + คำนวณแนะนำสั่งสด
// ══════════════════════════════════════════
function extractCounts() {
  const counts = [];
  document.querySelectorAll('.qty-input').forEach(input => {
    if (input.value === '') return;
    const qty = parseFloat(input.value);
    if (Number.isNaN(qty) || qty < 0) return;
    counts.push({ name: input.dataset.name, unit: input.dataset.unit, qty_remaining: qty });
  });
  return counts;
}

function computeSuggestedOrders() {
  // ใช้ค่า "เหลือ" ที่พึ่งพิมพ์ล่าสุด + avg_weekly_use จาก server มาคำนวณแนะนำสั่งสด
  const counts = extractCounts();
  const orders = [];
  counts.forEach(c => {
    const s = suggestions.get(suggKey(c.name, c.unit));
    const avg = s && s.avg_weekly_use != null ? Number(s.avg_weekly_use) : null;
    if (avg === null) return; // ยังไม่มีข้อมูลพอ ไม่แนะนำ
    const qty = Math.max(0, Math.ceil(avg * 1.2 - c.qty_remaining));
    if (qty > 0) {
      // หา tab/category ของ item เพื่อใส่ tab_name ตอนส่ง submit-stock
      const found = findCatalogItem(c.name);
      orders.push({ name: c.name, unit: c.unit, tab: found ? found.tab : '', qty });
    }
  });
  return orders;
}

function findCatalogItem(name) {
  for (const t of CATALOG) {
    for (const g of t.groups) {
      for (const item of g.items) {
        if (item.name === name) return { tab: t.tab, item };
      }
    }
  }
  return null;
}

// ══════════════════════════════════════════
//  REVIEW SHEET
// ══════════════════════════════════════════
let reviewOrders = [];

function openReview() {
  const counts = extractCounts();
  if (counts.length === 0) {
    alert('ยังไม่ได้นับรายการใดเลย กรุณากรอกอย่างน้อย 1 รายการ');
    return;
  }
  reviewOrders = computeSuggestedOrders();

  const body = document.getElementById('review-body');
  if (reviewOrders.length === 0) {
    body.innerHTML = '<div class="review-empty">ยังไม่มีรายการที่แนะนำให้สั่งสัปดาห์นี้<br>(ของเหลือเพียงพอ หรือยังไม่มีข้อมูลค่าเฉลี่ยพอ)</div>';
  } else {
    body.innerHTML = reviewOrders.map((o, i) => `
      <div class="suggest-row">
        <input type="checkbox" class="suggest-check" id="chk-${i}" checked>
        <div class="suggest-info">
          <div class="suggest-name">${o.name}</div>
          <div class="suggest-meta">${o.unit}</div>
        </div>
        <input type="number" class="suggest-qty" id="qty-${i}" value="${o.qty}" min="0">
      </div>`).join('');
  }

  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const thY = now.getFullYear() - 2500 + 543;
  document.getElementById('review-subtitle').textContent =
    `นับ ${counts.length} รายการ · ${pad(now.getDate())}/${pad(now.getMonth()+1)}/${thY} · สาขา หาดใหญ่`;

  document.getElementById('review-overlay').classList.remove('hidden');
}

function closeReview() {
  document.getElementById('review-overlay').classList.add('hidden');
}

// ══════════════════════════════════════════
//  CONFIRM & SEND (2 ขั้น: นับสต็อก → ใบสั่งของ)
// ══════════════════════════════════════════
async function confirmAndSend() {
  const btnConfirm = document.getElementById('btn-confirm');
  btnConfirm.disabled = true;

  const finalOrders = reviewOrders
    .map((o, i) => {
      const chk = document.getElementById('chk-' + i);
      const qtyEl = document.getElementById('qty-' + i);
      if (!chk || !chk.checked) return null;
      const qty = parseFloat(qtyEl.value);
      if (Number.isNaN(qty) || qty <= 0) return null;
      return { tab: o.tab, name: o.name, unit: o.unit, qty };
    })
    .filter(Boolean);

  closeReview();
  document.getElementById('loading-overlay').classList.remove('hidden');
  document.getElementById('loading-text').textContent = 'กำลังบันทึกการนับสต็อก…';

  const countPayload = {
    branch: BRANCH,
    counted_at: thaiISO(),
    note: document.getElementById('note-field').value.trim(),
    items: extractCounts(),
  };

  try {
    const countResp = await fetch(STOCK_COUNT_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(countPayload),
    });
    const countJson = await countResp.json().catch(() => null);
    if (!countResp.ok) {
      throw new Error(countJson && countJson.message ? countJson.message : ('HTTP ' + countResp.status));
    }
  } catch (err) {
    document.getElementById('loading-overlay').classList.add('hidden');
    btnConfirm.disabled = false;
    alert('❌ บันทึกการนับสต็อกไม่สำเร็จ\n\nกรุณาลองใหม่อีกครั้ง\n(' + err.message + ')');
    return;
  }

  // นับสต็อกสำเร็จแล้ว — ถ้ามีของที่ต้องสั่ง ส่งใบสั่งของต่อ
  if (finalOrders.length > 0) {
    document.getElementById('loading-text').textContent = 'กำลังส่งใบสั่งของ…';
    const orderPayload = {
      branch: BRANCH,
      submitted_at: thaiISO(),
      note: 'สั่งจากระบบแนะนำ (นับสต็อก ' + new Date().toLocaleDateString('th-TH') + ')',
      items: finalOrders,
    };
    try {
      const orderResp = await fetch(STOCK_SUBMIT_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(orderPayload),
      });
      const orderJson = await orderResp.json().catch(() => null);
      if (!orderResp.ok) {
        throw new Error(orderJson && orderJson.message ? orderJson.message : ('HTTP ' + orderResp.status));
      }
    } catch (err) {
      showDone(
        `✅ บันทึกการนับสต็อกแล้ว<br>❌ แต่ใบสั่งของยังไม่สำเร็จ: ${err.message}`,
        finalOrders
      );
      return;
    }
  }

  showDone(
    `นับสต็อก ${countPayload.items.length} รายการ` +
    (finalOrders.length > 0 ? `<br>ส่งใบสั่งของ ${finalOrders.length} รายการ` : '<br>ไม่มีรายการที่ต้องสั่งสัปดาห์นี้'),
    null
  );
}

function showDone(detailHtml, retryOrders) {
  document.getElementById('loading-overlay').classList.add('hidden');
  document.getElementById('done-detail').innerHTML = detailHtml;
  if (retryOrders) {
    const btn = document.createElement('button');
    btn.className = 'retry-order-btn';
    btn.textContent = '🔁 ลองส่งใบสั่งของอีกครั้ง';
    btn.onclick = () => retrySendOrder(retryOrders, btn);
    document.getElementById('done-detail').after(btn);
  }
  document.getElementById('done-screen').classList.remove('hidden');
}

async function retrySendOrder(orders, btn) {
  btn.disabled = true;
  btn.textContent = 'กำลังส่ง…';
  try {
    const resp = await fetch(STOCK_SUBMIT_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        branch: BRANCH,
        submitted_at: thaiISO(),
        note: 'สั่งจากระบบแนะนำ (retry)',
        items: orders,
      }),
    });
    const json = await resp.json().catch(() => null);
    if (!resp.ok) throw new Error(json && json.message ? json.message : ('HTTP ' + resp.status));
    btn.textContent = '✅ ส่งสำเร็จแล้ว';
  } catch (err) {
    btn.disabled = false;
    btn.textContent = '🔁 ลองอีกครั้ง';
    alert('ยังไม่สำเร็จ: ' + err.message);
  }
}

// ══════════════════════════════════════════
//  INIT

(function init() {
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  const thY = d.getFullYear() - 2500 + 543;
  document.getElementById('hdate').textContent =
    `สาขา หาดใหญ่ · ${pad(d.getDate())}/${pad(d.getMonth()+1)}/${thY}`;
  document.getElementById('clock').textContent = pad(d.getHours()) + ':' + pad(d.getMinutes());

  renderTabs();
  renderContent();
  updateTabCount();
  loadSuggestions();
})();
</script>
